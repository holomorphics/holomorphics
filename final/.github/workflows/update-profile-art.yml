name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"   # once a day; off-the-hour to dodge GitHub Actions congestion
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper deps
        run: pip install -r scripts/requirements.txt

      - name: Re-scrape contributions
        env:
          GH_PROFILE_USER: holomorphics
        run: python scripts/fetch_contributions.py

      - name: Re-render heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit if changed
        run: |
          git config user.name "profile-art-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --staged --quiet || git commit -m "chore: refresh contribution graph"
          git push
